apiVersion: apps/v1
kind: Deployment
metadata:
  name: backoffice-ui
  namespace: paygate
  labels:
    app: backoffice-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backoffice-ui
  template:
    metadata:
      labels:
        app: backoffice-ui
    spec:
      containers:
        - name: backoffice-ui
          image: localhost:5000/paygate-backoffice:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backoffice-ui
  namespace: paygate
  labels:
    app: backoffice-ui
spec:
  type: NodePort
  selector:
    app: backoffice-ui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30212
      name: http
