apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: paygate
  labels:
    app: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: portal
          image: localhost:5000/paygate-portal:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: paygate
  labels:
    app: portal
spec:
  type: NodePort
  selector:
    app: portal
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30211
      name: http
