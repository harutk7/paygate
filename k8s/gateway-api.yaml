apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
  namespace: paygate
  labels:
    app: gateway-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-api
  template:
    metadata:
      labels:
        app: gateway-api
    spec:
      containers:
        - name: gateway-api
          image: localhost:5000/paygate-gateway-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE
              value: "false"
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: paygate-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_HTTP_PORTS
              valueFrom:
                configMapKeyRef:
                  name: paygate-config
                  key: ASPNETCORE_HTTP_PORTS
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: paygate-secrets
                  key: SA_PASSWORD
            - name: ConnectionStrings__paymentdb
              value: "Server=paymentdb.paygate.svc.cluster.local;Database=paymentdb;User Id=sa;Password=$(SA_PASSWORD);TrustServerCertificate=true;Encrypt=false"
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: paygate-secrets
                  key: JWT_KEY
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: paygate-config
                  key: JWT_ISSUER
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: paygate-config
                  key: JWT_AUDIENCE
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /alive
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z paymentdb.paygate.svc.cluster.local 1433; do echo waiting for sqlserver; sleep 3; done']
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  namespace: paygate
  labels:
    app: gateway-api
spec:
  type: NodePort
  selector:
    app: gateway-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30202
      name: http
